<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>資通安全基本概念測驗</title>
<style>
body{font-family:"Microsoft JhengHei",sans-serif;background:#0f172a;color:#e5e7eb;padding:20px;}
h1,h2,h3{color:#38bdf8;}
.section{background:#020617;padding:15px;border-radius:8px;margin-bottom:20px;}
.question{margin-bottom:15px;}
input{padding:5px;margin:5px;}
button{background:#38bdf8;border:none;padding:10px 20px;font-size:16px;border-radius:6px;cursor:pointer;margin:5px;}
button:hover{background:#0ea5e9;}
button.danger{background:#ef4444;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #334155;padding:8px;text-align:center;}
th{background:#1e293b;}
</style>
</head>
<body>

<h1>🛡️ 加密與資料保護測驗（20 題）</h1>

<div class="section">
  <h2>👨‍🎓 學生資料</h2>
  班級：<input id="classInput">
  座號：<input id="noInput">
  姓名：<input id="nameInput">
</div>

<div class="section" id="quiz"></div>
<button type="button" onclick="submitQuiz()">提交測驗</button>
<h2 id="result"></h2>

<hr>

<div class="section" id="teacherLoginDiv">
  <h2>🔐 教師登入</h2>
  教師密碼：<input type="password" id="teacherPwd">
  <button type="button" onclick="teacherLogin()">登入</button>
  <p id="loginMsg" style="color:#f87171"></p>
</div>

<div class="section" id="teacherArea" style="display:none">
  <h2>👨‍🏫 教師成績總覽</h2>
  <button type="button" onclick="exportCSV()">📤 匯出 CSV</button>
  <button class="danger" type="button" onclick="clearRecords()">🗑 清空所有成績</button>

  <table>
    <thead>
      <tr>
        <th>班級</th><th>座號</th><th>姓名</th><th>分數</th><th>時間</th>
      </tr>
    </thead>
    <tbody id="records"></tbody>
  </table>

  <button type="button" onclick="showAnswers()">📢 公佈正確答案</button>
  <div id="answerDiv" style="display:none">
    <h3>📌 正確答案表</h3>
    <table>
      <thead>
        <tr><th>題號</th><th>題目</th><th>正確答案</th></tr>
      </thead>
      <tbody id="answerKey"></tbody>
    </table>
  </div>
</div>

<script>
const TEACHER_PASSWORD = "teacher123";

/* ===== 題庫：加密與資料保護（20 題）===== */
const questions = [
 {id:1,q:"AES 是哪種類型的加密？",o:["對稱式加密","非對稱式加密","單向哈希","混合加密"],a:0},
 {id:2,q:"RSA 加密的特性是？",o:["非對稱式加密","對稱式加密","雜湊函數","流加密"],a:0},
 {id:3,q:"SHA-256 屬於？",o:["單向哈希","對稱加密","非對稱加密","簽章演算法"],a:0},
 {id:4,q:"加密傳輸常用協定？",o:["HTTPS","HTTP","FTP","Telnet"],a:0},
 {id:5,q:"數位簽章可提供？",o:["驗證資料完整性與來源","加速網路","防火牆","資料備份"],a:0},
 {id:6,q:"對稱式加密優點？",o:["速度快","安全性最高","無需密鑰","自動更新"],a:0},
 {id:7,q:"非對稱式加密優點？",o:["安全傳輸密鑰交換","速度最快","無需金鑰","加密硬碟"],a:0},
 {id:8,q:"資料加密主要目的？",o:["保護機密性","提升速度","減少容量","增加可用性"],a:0},
 {id:9,q:"雜湊函數用途？",o:["檢驗資料完整性","加密網路流量","管理帳號","提升硬體效能"],a:0},
 {id:10,q:"端到端加密 E2EE 的意義？",o:["訊息從端到端均加密","中間節點可解密","僅傳輸 HTTPS","加快傳輸"],a:0},
 {id:11,q:"SSL/TLS 協定作用？",o:["加密通訊與身份驗證","資料備份","清理垃圾","提升網速"],a:0},
 {id:12,q:"密鑰管理最重要？",o:["妥善保管與更新","提高速度","增加記憶體","減少網路延遲"],a:0},
 {id:13,q:"硬碟加密目的是？",o:["保護靜態資料","加速開機","改善效能","管理使用者"],a:0},
 {id:14,q:"對稱式加密缺點？",o:["密鑰傳輸問題","加密慢","不安全","無法用於雲端"],a:0},
 {id:15,q:"非對稱式加密缺點？",o:["加密速度慢","不安全","無法驗證來源","無法傳輸"],a:0},
 {id:16,q:"數位簽章可防範？",o:["偽造文件","病毒","蠕蟲","木馬"],a:0},
 {id:17,q:"雜湊函數不可逆，適用於？",o:["密碼儲存","資料加密傳輸","VPN","防火牆"],a:0},
 {id:18,q:"資料傳輸加密不包括？",o:["壓縮檔案","HTTPS","SSL/TLS","VPN"],a:0},
 {id:19,q:"混合加密通常使用？",o:["對稱式加密 + 非對稱式加密","僅對稱","僅非對稱","雜湊"],a:0},
 {id:20,q:"密碼學三要素 CIA 中的 C 代表？",o:["機密性","完整性","可用性","便利性"],a:0}
];

let currentQuestions = [];

/* ===== 載入題目（隨機）===== */
window.onload = function(){
  currentQuestions = [...questions].sort(()=>Math.random()-0.5);
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";
  currentQuestions.forEach((q,i)=>{
    let html = `<div class="question"><b>${i+1}. ${q.q}</b><br>`;
    q.o.forEach((o,j)=>{
      html += `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;
    });
    html += "</div>";
    quiz.innerHTML += html;
  });
}

/* ===== 學生提交 ===== */
function submitQuiz(){
  const c = document.getElementById("classInput").value.trim();
  const n = document.getElementById("noInput").value.trim();
  const nm = document.getElementById("nameInput").value.trim();

  if(!c || !n || !nm){
    alert("請填完整學生資料");
    return;
  }

  let score = 0;
  currentQuestions.forEach((q,i)=>{
    const s = document.querySelector(`input[name="q${i}"]:checked`);
    if(s && +s.value === q.a) score++;
  });

  document.getElementById("result").innerText = `你的成績：${score} / 20`;

  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.push({class:c,no:n,name:nm,score,time:new Date().toLocaleString()});
  localStorage.setItem("records", JSON.stringify(data));
  loadRecords();
}

/* ===== 教師登入 ===== */
function teacherLogin(){
  const teacherPwdInput = document.getElementById("teacherPwd");
  const teacherLoginDiv = document.getElementById("teacherLoginDiv");
  const teacherArea = document.getElementById("teacherArea");
  const loginMsg = document.getElementById("loginMsg");

  if(teacherPwdInput.value === TEACHER_PASSWORD){
    teacherLoginDiv.style.display="none";
    teacherArea.style.display="block";
    loadRecords();
  } else {
    loginMsg.innerText="❌ 密碼錯誤";
  }
}

/* ===== 顯示成績 ===== */
function loadRecords(){
  const records = document.getElementById("records");
  records.innerHTML = "";
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.forEach(r=>{
    records.innerHTML += `<tr>
      <td>${r.class}</td>
      <td>${r.no}</td>
      <td>${r.name}</td>
      <td>${r.score}</td>
      <td>${r.time}</td>
    </tr>`;
  });
}

/* ===== 清空成績 ===== */
function clearRecords(){
  if(confirm("確定清空所有學生成績？")){
    localStorage.removeItem("records");
    loadRecords();
    alert("✅ 成績已清空");
  }
}

/* ===== 公佈答案 ===== */
function showAnswers(){
  const answerDiv = document.getElementById("answerDiv");
  const answerKey = document.getElementById("answerKey");
  answerDiv.style.display="block";
  answerKey.innerHTML="";
  questions.forEach(q=>{
    answerKey.innerHTML += `<tr>
      <td>${q.id}</td>
      <td>${q.q}</td>
      <td>${q.o[q.a]}</td>
    </tr>`;
  });
}

/* ===== CSV 匯出（UTF-8 + BOM，Excel 不亂碼）===== */
function exportCSV(){
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  if(!data.length){
    alert("目前沒有成績可匯出");
    return;
  }

  let csv = "班級,座號,姓名,分數,時間\n";
  data.forEach(r=>{
    csv += `"${r.class}","${r.no}","${r.name}","${r.score}","${r.time}"\n`;
  });

  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });

  const a = document.createElement("a");
  a.style.display = "none";
  a.href = URL.createObjectURL(blob);
  a.download = "加密與資料保護測驗成績.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>

</body>
</html>
