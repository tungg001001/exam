<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>資通安全基本概念測驗</title>
<style>
body{font-family:"Microsoft JhengHei",sans-serif;background:#0f172a;color:#e5e7eb;padding:20px;}
h1,h2,h3{color:#38bdf8;}
.section{background:#020617;padding:15px;border-radius:8px;margin-bottom:20px;}
.question{margin-bottom:15px;}
input{padding:5px;margin:5px;}
button{background:#38bdf8;border:none;padding:10px 20px;font-size:16px;border-radius:6px;cursor:pointer;margin:5px;}
button:hover{background:#0ea5e9;}
button.danger{background:#ef4444;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #334155;padding:8px;text-align:center;}
th{background:#1e293b;}
</style>
</head>
<body>

<h1>🛡️ 儲存裝置破壞測驗（20 題）</h1>

<div class="section">
  <h2>👨‍🎓 學生資料</h2>
  班級：<input id="className">
  座號：<input id="no">
  姓名：<input id="name">
</div>

<div class="section" id="quiz"></div>
<button onclick="submitQuiz()">提交測驗</button>
<h2 id="result"></h2>

<hr>

<div class="section" id="teacherLoginDiv">
  <h2>🔐 教師登入</h2>
  教師密碼：<input type="password" id="teacherPwd">
  <button onclick="teacherLogin()">登入</button>
  <p id="loginMsg" style="color:#f87171"></p>
</div>

<div class="section" id="teacherArea" style="display:none">
  <h2>👨‍🏫 教師成績總覽</h2>
  <button onclick="exportCSV()">📤 匯出 CSV</button>
  <button class="danger" onclick="clearRecords()">🗑 清空所有成績</button>

  <table>
    <thead>
      <tr>
        <th>班級</th><th>座號</th><th>姓名</th><th>分數</th><th>時間</th>
      </tr>
    </thead>
    <tbody id="records"></tbody>
  </table>

  <button onclick="showAnswers()">📢 公佈正確答案</button>
  <div id="answerDiv" style="display:none">
    <h3>📌 正確答案表</h3>
    <table>
      <thead>
        <tr><th>題號</th><th>題目</th><th>正確答案</th></tr>
      </thead>
      <tbody id="answerKey"></tbody>
    </table>
  </div>
</div>

<script>
const TEACHER_PASSWORD = "teacher123";

/* ===== 題庫 ===== */
const questions = [
 {id:1,q:"硬碟破壞的常見方法？",o:["格式化","加密","備份","重啟"],a:0},
 {id:2,q:"SSD 完全刪除資料需？",o:["使用安全擦除工具","關機","備份","加密"],a:0},
 {id:3,q:"USB 隨身碟破壞可能造成？",o:["資料無法讀取","加速系統","提升效能","SEO 優化"],a:0},
 {id:4,q:"磁碟碎片破壞資料效果？",o:["減少可恢復性","加速系統","增加效能","備份資料"],a:0},
 {id:5,q:"使用強力磁鐵破壞硬碟原理？",o:["破壞磁性資訊","加密資料","備份資料","提升速度"],a:0},
 {id:6,q:"刪除檔案但未覆寫？",o:["資料可恢復","加速網頁","增加效能","備份資料"],a:0},
 {id:7,q:"破壞光碟的安全方式？",o:["刻痕或碎片化","加密資料","備份資料","SEO 優化"],a:0},
 {id:8,q:"固態硬碟安全刪除工具？",o:["ATA Secure Erase","Excel","Word","Photoshop"],a:0},
 {id:9,q:"資料破壞前應先？",o:["備份重要資料","加速網頁","增加流量","SEO 優化"],a:0},
 {id:10,q:"刪除磁碟分區會？",o:["資料消失但可能被恢復","提升效能","加速網站","SEO 優化"],a:0},
 {id:11,q:"資料粉碎軟體作用？",o:["覆寫資料增加不可恢復性","加密資料","備份資料","提升速度"],a:0},
 {id:12,q:"硬碟物理破壞目的？",o:["防止資料被讀取","加速網頁","增加流量","SEO 優化"],a:0},
 {id:13,q:"RAID 系統破壞影響？",o:["可能整個陣列資料丟失","加密資料","備份資料","SEO 優化"],a:0},
 {id:14,q:"磁帶存儲破壞方法？",o:["剪斷或粉碎","加密資料","備份資料","提升速度"],a:0},
 {id:15,q:"刪除雲端檔案注意？",o:["確認同步到所有裝置","加密資料","備份資料","提升速度"],a:0},
 {id:16,q:"破壞存儲裝置需注意？",o:["合法授權與安全","加速網站","增加流量","SEO 優化"],a:0},
 {id:17,q:"磁碟擦除標準？",o:["DoD 5220.22-M","加密工具","備份工具","提升速度"],a:0},
 {id:18,q:"破壞 SD 卡工具？",o:["格式化與粉碎工具","加速網站","增加流量","SEO 優化"],a:0},
 {id:19,q:"資料不可恢復方法？",o:["覆寫多次","加密資料","備份資料","SEO 優化"],a:0},
 {id:20,q:"硬碟安全處理原則？",o:["防止敏感資料外洩","加速網站","增加流量","SEO 優化"],a:0}
];

let currentQuestions = [];

/* ===== 載入題目 ===== */
window.onload = () => {
  currentQuestions = [...questions].sort(()=>Math.random()-0.5);
  quiz.innerHTML = "";
  currentQuestions.forEach((q,i)=>{
    let h = `<div class="question"><b>${i+1}. ${q.q}</b><br>`;
    q.o.forEach((o,j)=>{
      h += `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;
    });
    quiz.innerHTML += h + "</div>";
  });
};

/* ===== 學生提交（✅ 已修正）===== */
function submitQuiz(){
  const c  = className.value.replace(/\s/g,'');
  const n  = no.value.replace(/\s/g,'');
  const nm = name.value.replace(/\s/g,'');

  if(!c || !n || !nm){
    alert("請填完整學生資料");
    return;
  }

  let score = 0;
  currentQuestions.forEach((q,i)=>{
    const s = document.querySelector(`input[name="q${i}"]:checked`);
    if(s && +s.value === q.a) score++;
  });

  result.innerText = `你的成績：${score} / 20`;

  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.push({class:c,no:n,name:nm,score,time:new Date().toLocaleString()});
  localStorage.setItem("records", JSON.stringify(data));
  loadRecords();
}

/* ===== 教師功能 ===== */
function teacherLogin(){
  if(teacherPwd.value === TEACHER_PASSWORD){
    teacherLoginDiv.style.display="none";
    teacherArea.style.display="block";
    loadRecords();
  }else loginMsg.innerText="❌ 密碼錯誤";
}

function loadRecords(){
  records.innerHTML="";
  JSON.parse(localStorage.getItem("records")||"[]")
    .forEach(r=>{
      records.innerHTML+=`<tr><td>${r.class}</td><td>${r.no}</td><td>${r.name}</td><td>${r.score}</td><td>${r.time}</td></tr>`;
    });
}

function clearRecords(){
  if(confirm("確定清空所有學生成績？")){
    localStorage.removeItem("records");
    loadRecords();
  }
}

function showAnswers(){
  answerDiv.style.display="block";
  answerKey.innerHTML="";
  questions.forEach(q=>{
    answerKey.innerHTML+=`<tr><td>${q.id}</td><td>${q.q}</td><td>${q.o[q.a]}</td></tr>`;
  });
}

function exportCSV(){
  const data = JSON.parse(localStorage.getItem("records")||"[]");
  if(!data.length) return alert("目前沒有成績");
  let csv="班級,座號,姓名,分數,時間\n";
  data.forEach(r=>csv+=`"${r.class}","${r.no}","${r.name}","${r.score}","${r.time}"\n`);
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="儲存裝置破壞測驗成績.csv";
  a.click();
}
</script>

</body>
</html>
