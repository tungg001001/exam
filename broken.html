<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>儲存裝置破壞測驗</title>
<style>
body{font-family:"Microsoft JhengHei",sans-serif;background:#0f172a;color:#e5e7eb;padding:20px;}
h1,h2,h3{color:#38bdf8;}
.section{background:#020617;padding:15px;border-radius:8px;margin-bottom:20px;}
.question{margin-bottom:15px;}
input{padding:5px;margin:5px;}
button{background:#38bdf8;border:none;padding:10px 20px;font-size:16px;border-radius:6px;cursor:pointer;margin:5px;}
button:hover{background:#0ea5e9;}
button.danger{background:#ef4444;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #334155;padding:8px;text-align:center;}
th{background:#1e293b;}
</style>
</head>
<body>

<h1>🛡️ 儲存裝置破壞測驗（20 題）</h1>

<div class="section">
  <h2>👨‍🎓 學生資料</h2>
  班級：<input type="text" id="className">
  座號：<input type="text" id="no">
  姓名：<input type="text" id="studentName">
</div>

<div class="section" id="quiz"></div>
<button onclick="submitQuiz()">提交測驗</button>
<h2 id="result"></h2>

<hr>

<div class="section" id="teacherLoginDiv">
  <h2>🔐 教師登入</h2>
  教師密碼：<input type="password" id="teacherPwd">
  <button onclick="teacherLogin()">登入</button>
  <p id="loginMsg" style="color:#f87171"></p>
</div>

<div class="section" id="teacherArea" style="display:none">
  <h2>👨‍🏫 教師成績總覽</h2>
  <button onclick="exportCSV()">📤 匯出 CSV</button>
  <button class="danger" onclick="clearRecords()">🗑 清空所有成績</button>

  <table>
    <thead>
      <tr>
        <th>班級</th><th>座號</th><th>姓名</th><th>分數</th><th>時間</th>
      </tr>
    </thead>
    <tbody id="records"></tbody>
  </table>

  <button onclick="showAnswers()">📢 公佈正確答案</button>
  <div id="answerDiv" style="display:none">
    <h3>📌 正確答案表</h3>
    <table>
      <thead>
        <tr><th>題號</th><th>題目</th><th>正確答案</th></tr>
      </thead>
      <tbody id="answerKey"></tbody>
    </table>
  </div>
</div>

<script>
const TEACHER_PASSWORD = "teacher123";

/* ===== 題庫 ===== */
const questions = [
 {id:1,q:"硬碟破壞的常見方法？",o:["格式化","加密","備份","重啟"],a:0},
 {id:2,q:"SSD 完全刪除資料需？",o:["使用安全擦除工具","關機","備份","加密"],a:0},
 {id:3,q:"USB 隨身碟破壞可能造成？",o:["資料無法讀取","加速系統","提升效能","SEO"],a:0},
 {id:4,q:"磁碟碎片破壞資料效果？",o:["減少可恢復性","加速系統","效能","備份"],a:0},
 {id:5,q:"強力磁鐵破壞硬碟原理？",o:["破壞磁性資訊","加密","備份","提升"],a:0},
 {id:6,q:"刪除但未覆寫？",o:["資料可恢復","加速","效能","備份"],a:0},
 {id:7,q:"破壞光碟方式？",o:["刻痕或碎片化","加密","備份","SEO"],a:0},
 {id:8,q:"SSD 安全刪除工具？",o:["ATA Secure Erase","Excel","Word","PS"],a:0},
 {id:9,q:"破壞前應先？",o:["備份","加速","流量","SEO"],a:0},
 {id:10,q:"刪除分區會？",o:["可能被恢復","效能","網站","SEO"],a:0},
 {id:11,q:"資料粉碎軟體？",o:["覆寫資料","加密","備份","提升"],a:0},
 {id:12,q:"硬碟物理破壞？",o:["防止資料被讀取","加速","流量","SEO"],a:0},
 {id:13,q:"RAID 破壞影響？",o:["整個陣列資料遺失","加密","備份","SEO"],a:0},
 {id:14,q:"磁帶破壞？",o:["剪斷或粉碎","加密","備份","提升"],a:0},
 {id:15,q:"雲端刪除注意？",o:["同步裝置","加密","備份","提升"],a:0},
 {id:16,q:"破壞裝置需注意？",o:["合法與安全","加速","流量","SEO"],a:0},
 {id:17,q:"磁碟擦除標準？",o:["DoD 5220.22-M","加密","備份","提升"],a:0},
 {id:18,q:"SD 卡破壞？",o:["格式化與粉碎","加速","流量","SEO"],a:0},
 {id:19,q:"不可恢復方法？",o:["多次覆寫","加密","備份","SEO"],a:0},
 {id:20,q:"安全處理原則？",o:["防止資料外洩","加速","流量","SEO"],a:0}
];

let currentQuestions = [];

/* ===== 載入題目 ===== */
window.onload = function(){
  currentQuestions = [...questions].sort(()=>Math.random()-0.5);
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";
  currentQuestions.forEach((q,i)=>{
    let html = `<div class="question"><b>${i+1}. ${q.q}</b><br>`;
    q.o.forEach((o,j)=>{
      html += `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;
    });
    html += "</div>";
    quiz.innerHTML += html;
  });
}

/* ===== 學生提交（✔ 最終正確版）===== */
function submitQuiz(){
  const c  = document.getElementById("className").value.replace(/\s/g,'');
  const n  = document.getElementById("no").value.replace(/\s/g,'');
  const nm = document.getElementById("studentName").value.replace(/\s/g,'');

  if(!c || !n || !nm){
    alert("請填完整學生資料");
    return;
  }

  let score = 0;
  currentQuestions.forEach((q,i)=>{
    const s = document.querySelector(`input[name="q${i}"]:checked`);
    if(s && +s.value === q.a) score++;
  });

  document.getElementById("result").innerText = `你的成績：${score} / 20`;

  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.push({class:c,no:n,name:nm,score,time:new Date().toLocaleString()});
  localStorage.setItem("records", JSON.stringify(data));
  loadRecords();
}

/* ===== 教師登入 ===== */
function teacherLogin(){
  if(document.getElementById("teacherPwd").value === TEACHER_PASSWORD){
    document.getElementById("teacherLoginDiv").style.display="none";
    document.getElementById("teacherArea").style.display="block";
    loadRecords();
  }else{
    document.getElementById("loginMsg").innerText="❌ 密碼錯誤";
  }
}

/* ===== 成績 ===== */
function loadRecords(){
  const records = document.getElementById("records");
  records.innerHTML = "";
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.forEach(r=>{
    records.innerHTML += `<tr>
      <td>${r.class}</td>
      <td>${r.no}</td>
      <td>${r.name}</td>
      <td>${r.score}</td>
      <td>${r.time}</td>
    </tr>`;
  });
}

/* ===== 其餘功能 ===== */
function clearRecords(){
  if(confirm("確定清空所有學生成績？")){
    localStorage.removeItem("records");
    loadRecords();
  }
}

function showAnswers(){
  document.getElementById("answerDiv").style.display="block";
  const ak = document.getElementById("answerKey");
  ak.innerHTML="";
  questions.forEach(q=>{
    ak.innerHTML += `<tr><td>${q.id}</td><td>${q.q}</td><td>${q.o[q.a]}</td></tr>`;
  });
}

function exportCSV(){
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  if(!data.length){ alert("目前沒有成績"); return; }
  let csv = "班級,座號,姓名,分數,時間\n";
  data.forEach(r=>csv+=`"${r.class}","${r.no}","${r.name}","${r.score}","${r.time}"\n`);
  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "儲存裝置破壞測驗成績.csv";
  a.click();
}
</script>

</body>
</html>
