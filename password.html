<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>帳號與身分驗證測驗</title>
<style>
body{font-family:"Microsoft JhengHei",sans-serif;background:#0f172a;color:#e5e7eb;padding:20px;}
h1,h2,h3{color:#38bdf8;}
.section{background:#020617;padding:15px;border-radius:8px;margin-bottom:20px;}
.question{margin-bottom:15px;}
input{padding:5px;margin:5px;}
button{background:#38bdf8;border:none;padding:10px 20px;font-size:16px;border-radius:6px;cursor:pointer;margin:5px;}
button:hover{background:#0ea5e9;}
button.danger{background:#ef4444;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #334155;padding:8px;text-align:center;}
th{background:#1e293b;}
</style>
</head>
<body>

<h1>🛡️ 帳號與身分驗證測驗（20 題）</h1>

<div class="section">
  <h2>👨‍🎓 學生資料</h2>
  班級：<input id="className">
  座號：<input id="no">
  姓名：<input id="name">
</div>

<div class="section" id="quiz"></div>
<button onclick="submitQuiz()">提交測驗</button>
<h2 id="result"></h2>

<hr>

<div class="section" id="teacherLoginDiv">
  <h2>🔐 教師登入</h2>
  教師密碼：<input type="password" id="teacherPwd">
  <button onclick="teacherLogin()">登入</button>
  <p id="loginMsg" style="color:#f87171"></p>
</div>

<div class="section" id="teacherArea" style="display:none">
  <h2>👨‍🏫 教師成績總覽</h2>
  <button onclick="exportCSV()">📤 匯出 CSV</button>
  <button class="danger" onclick="clearRecords()">🗑 清空所有成績</button>

  <table>
    <thead>
      <tr><th>班級</th><th>座號</th><th>姓名</th><th>分數</th><th>時間</th></tr>
    </thead>
    <tbody id="records"></tbody>
  </table>

  <button onclick="showAnswers()">📢 公佈正確答案</button>
  <div id="answerDiv" style="display:none">
    <h3>📌 正確答案表</h3>
    <table>
      <thead>
        <tr><th>題號</th><th>題目</th><th>正確答案</th></tr>
      </thead>
      <tbody id="answerKey"></tbody>
    </table>
  </div>
</div>

<script>
const TEACHER_PASSWORD = "teacher123";

/* 題庫 */
const questions = [
 {id:1,q:"多因素驗證（MFA）通常包含哪兩種以上因素？",o:["僅密碼","密碼+另一認證","手機型號+OS版本","硬體設備+IP"],a:1},
 {id:2,q:"下列何者不是良好密碼習慣？",o:["使用長且複雜密碼","重複使用相同密碼","定期更換密碼","使用大小寫字母符號"],a:1},
 {id:3,q:"單一登入（SSO）主要功能為何？",o:["每次登入需重新認證","一次登入多個系統","加速硬體","防火牆保護"],a:1},
 {id:4,q:"OAuth 用途主要為？",o:["管理防火牆","第三方授權登入","加密資料","網頁快取"],a:1},
 {id:5,q:"身份驗證（Authentication）與授權（Authorization）差異？",o:["無差異","驗證身份 vs 許可權","管理密碼 vs 控制封包","加密資料 vs 解密資料"],a:1},
 {id:6,q:"生物特徵驗證常用方式？",o:["密碼與 PIN","指紋、臉部識別","IP 位址","HTTP 連線"],a:1},
 {id:7,q:"CAPTCHA 主要目的是？",o:["提升網速","阻擋自動化程式","加密資料","測試硬體"],a:1},
 {id:8,q:"登入失敗多次後通常應採取？",o:["永久鎖定帳號","短暫鎖定或驗證","不做處理","加快登入"],a:1},
 {id:9,q:"社交工程攻擊常利用？",o:["使用者信任","防火牆","資料加密","硬體故障"],a:0},
 {id:10,q:"什麼是單向雜湊（Hash）在密碼存儲的作用？",o:["可逆加密","驗證密碼正確性","提升速度","共享帳號"],a:1},
 {id:11,q:"帳號凍結（Account Lockout）策略作用？",o:["阻止未授權登入","加速登入","加密資料","自動生成帳號"],a:0},
 {id:12,q:"JWT（JSON Web Token）主要用途？",o:["驗證身份與資料完整性","壓縮檔案","加速網路","防毒"],a:0},
 {id:13,q:"OTP（一次性密碼）特性為何？",o:["可重複使用","僅使用一次","與硬體無關","固定長度"],a:1},
 {id:14,q:"身分驗證系統最重要安全措施？",o:["強化密碼、加密、MFA","使用簡單密碼","公開帳號","不更新系統"],a:0},
 {id:15,q:"LDAP 常用於？",o:["管理使用者與認證","加密網路封包","控制防火牆","更新網頁"],a:0},
 {id:16,q:"SSO 優點不包含？",o:["減少多次登入麻煩","降低帳號重複使用","增加安全風險","提升使用者體驗"],a:2},
 {id:17,q:"什麼是強密碼？",o:["短且易記","長度夠且含大小寫數字符號","生日或姓名","簡單連號"],a:1},
 {id:18,q:"OAuth 2.0 與 OpenID Connect 差異？",o:["加密 vs 認證","授權 vs 認證","防火牆 vs 加密","登入 vs 註冊"],a:1},
 {id:19,q:"帳號共享的風險是？",o:["方便使用","增加被盜風險","提升安全","減少登入次數"],a:1},
 {id:20,q:"身分驗證成功後，系統通常授予？",o:["登入權限與操作權限","硬體資源","IP 位址","資料加密金鑰"],a:0}
];

let currentQuestions = [];

/* 載入題目 */
window.onload = function(){
  currentQuestions = [...questions].sort(()=>Math.random()-0.5);
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";
  currentQuestions.forEach((q,i)=>{
    let html = `<div class="question"><b>${i+1}. ${q.q}</b><br>`;
    q.o.forEach((o,j)=>{
      html += `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;
    });
    html += "</div>";
    quiz.innerHTML += html;
  });
}

/* 學生提交 */
function submitQuiz(){
  const c = document.getElementById("className").value;
  const n = document.getElementById("no").value;
  const nm = document.getElementById("name").value;
  if(!c || !n || !nm){
    alert("請填完整學生資料");
    return;
  }

  let score = 0;
  currentQuestions.forEach((q,i)=>{
    const s = document.querySelector(`input[name="q${i}"]:checked`);
    if(s && +s.value === q.a) score++;
  });

  document.getElementById("result").innerText = `你的成績：${score} / 20`;

  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.push({class:c,no:n,name:nm,score,time:new Date().toLocaleString()});
  localStorage.setItem("records", JSON.stringify(data));
  loadRecords();
}

/* 教師登入 */
function teacherLogin(){
  if(document.getElementById("teacherPwd").value === TEACHER_PASSWORD){
    document.getElementById("teacherLoginDiv").style.display="none";
    document.getElementById("teacherArea").style.display="block";
    loadRecords();
  }else{
    document.getElementById("loginMsg").innerText="❌ 密碼錯誤";
  }
}

/* 顯示成績 */
function loadRecords(){
  const records = document.getElementById("records");
  records.innerHTML = "";
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.forEach(r=>{
    records.innerHTML += `<tr>
      <td>${r.class}</td>
      <td>${r.no}</td>
      <td>${r.name}</td>
      <td>${r.score}</td>
      <td>${r.time}</td>
    </tr>`;
  });
}

/* 清空成績 */
function clearRecords(){
  if(confirm("確定清空所有學生成績？")){
    localStorage.removeItem("records");
    loadRecords();
    alert("✅ 成績已清空");
  }
}

/* 公佈答案 */
function showAnswers(){
  document.getElementById("answerDiv").style.display="block";
  const answerKey = document.getElementById("answerKey");
  answerKey.innerHTML="";
  questions.forEach(q=>{
    answerKey.innerHTML += `<tr>
      <td>${q.id}</td>
      <td>${q.q}</td>
      <td>${q.o[q.a]}</td>
    </tr>`;
  });
}

/* CSV 匯出 */
function exportCSV(){
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  if(!data.length){
    alert("目前沒有成績可匯出");
    return;
  }
  let csv = "班級,座號,姓名,分數,時間\n";
  data.forEach(r=>{
    csv += `"${r.class}","${r.no}","${r.name}","${r.score}","${r.time}"\n`;
  });
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "帳號與身分驗證測驗成績.csv";
  a.click();
}
</script>

</body>
</html>
