<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>資通安全基本概念測驗</title>
<style>
body{font-family:"Microsoft JhengHei",sans-serif;background:#0f172a;color:#e5e7eb;padding:20px;}
h1,h2,h3{color:#38bdf8;}
.section{background:#020617;padding:15px;border-radius:8px;margin-bottom:20px;}
.question{margin-bottom:15px;}
input{padding:5px;margin:5px;}
button{background:#38bdf8;border:none;padding:10px 20px;font-size:16px;border-radius:6px;cursor:pointer;margin:5px;}
button:hover{background:#0ea5e9;}
button.danger{background:#ef4444;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #334155;padding:8px;text-align:center;}
th{background:#1e293b;}
</style>
</head>
<body>

<h1>🛡️ 資通安全基本概念測驗（20 題）</h1>

<div class="section">
  <h2>👨‍🎓 學生資料</h2>
  班級：<input type="text" id="className">
  座號：<input type="text" id="no">
  姓名：<input type="text" id="studentName">
</div>

<div class="section" id="quiz"></div>
<button onclick="submitQuiz()">提交測驗</button>
<h2 id="result"></h2>

<hr>

<div class="section" id="teacherLoginDiv">
  <h2>🔐 教師登入</h2>
  教師密碼：<input type="password" id="teacherPwd">
  <button onclick="teacherLogin()">登入</button>
  <p id="loginMsg" style="color:#f87171"></p>
</div>

<div class="section" id="teacherArea" style="display:none">
  <h2>👨‍🏫 教師成績總覽</h2>
  <button onclick="exportCSV()">📤 匯出 CSV</button>
  <button class="danger" onclick="clearRecords()">🗑 清空所有成績</button>

  <table>
    <thead>
      <tr>
        <th>班級</th><th>座號</th><th>姓名</th><th>分數</th><th>時間</th>
      </tr>
    </thead>
    <tbody id="records"></tbody>
  </table>

  <button onclick="showAnswers()">📢 公佈正確答案</button>
  <div id="answerDiv" style="display:none">
    <h3>📌 正確答案表</h3>
    <table>
      <thead>
        <tr><th>題號</th><th>題目</th><th>正確答案</th></tr>
      </thead>
      <tbody id="answerKey"></tbody>
    </table>
  </div>
</div>

<script>
const TEACHER_PASSWORD = "teacher123";

/* ===== 題庫 ===== */
const questions = [
 {id:1,q:"資通安全核心目標？",o:["提升速度","CIA 三原則","增加設備","降低成本"],a:1},
 {id:2,q:"CIA 不包含？",o:["機密性","完整性","可用性","便利性"],a:3},
 {id:3,q:"社交工程例子？",o:["漏洞掃描","誘騙密碼","DDoS","破解"],a:1},
 {id:4,q:"降低帳號被盜？",o:["重複密碼","多因素驗證","寫紙上","生日"],a:1},
 {id:5,q:"不是惡意程式？",o:["病毒","木馬","蠕蟲","防火牆"],a:3},
 {id:6,q:"釣魚郵件特徵？",o:["官方信箱","急迫要求","無錯字","內部文件"],a:1},
 {id:7,q:"公共 Wi-Fi 安全？",o:["登入銀行","輸密碼","避免重要操作","關防火牆"],a:2},
 {id:8,q:"個資外洩原因？",o:["更新","亂裝 App","防毒","鎖屏"],a:1},
 {id:9,q:"防火牆功能？",o:["備份","阻擋未授權","加速","取代防毒"],a:1},
 {id:10,q:"MFA 範例？",o:["複雜密碼","密碼+簡訊","換密碼","自動登入"],a:1},
 {id:11,q:"不更新修補？",o:["變慢","漏洞被用","容量增","畫面錯"],a:1},
 {id:12,q:"好密碼？",o:["連號","姓名","大小寫符號","同帳號"],a:2},
 {id:13,q:"備份確保？",o:["機密性","完整性","可用性","可讀性"],a:2},
 {id:14,q:"防勒索？",o:["關機","不用網路","定期備份","簡單密碼"],a:2},
 {id:15,q:"IDS 功能？",o:["阻擋","偵測通報","取代防火牆","加密"],a:1},
 {id:16,q:"最小權限？",o:["同管理員","只給必要","共用帳號","公開密碼"],a:1},
 {id:17,q:"錯誤 USB？",o:["插不明 USB","掃毒","限制","避免亂插"],a:0},
 {id:18,q:"資安事件？",o:["正常關機","未授權存取","更新","合法"],a:1},
 {id:19,q:"保護隱私？",o:["公開密碼","揭露個資","設定隱私","共用帳號"],a:2},
 {id:20,q:"資安教育目的？",o:["增加功能","提升資安意識","降成本","少上網"],a:1}
];

let currentQuestions = [];

/* ===== 載入題目（隨機）===== */
window.onload = function(){
  currentQuestions = [...questions].sort(()=>Math.random()-0.5);
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";
  currentQuestions.forEach((q,i)=>{
    let html = `<div class="question"><b>${i+1}. ${q.q}</b><br>`;
    q.o.forEach((o,j)=>{
      html += `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;
    });
    html += "</div>";
    quiz.innerHTML += html;
  });
}

/* ===== 學生提交 ===== */
function submitQuiz(){
  const c = document.getElementById("className").value.trim();
  const n = document.getElementById("no").value.trim();
  const nm = document.getElementById("studentName").value.trim();

  if(!c || !n || !nm){
    alert("請填完整學生資料");
    return;
  }

  let score = 0;
  currentQuestions.forEach((q,i)=>{
    const s = document.querySelector(`input[name="q${i}"]:checked`);
    if(s && +s.value === q.a) score++;
  });

  document.getElementById("result").innerText = `你的成績：${score} / 20`;

  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.push({class:c,no:n,name:nm,score,time:new Date().toLocaleString()});
  localStorage.setItem("records", JSON.stringify(data));
  loadRecords();
}

/* ===== 教師登入 ===== */
function teacherLogin(){
  const pwd = document.getElementById("teacherPwd").value;
  if(pwd === TEACHER_PASSWORD){
    document.getElementById("teacherLoginDiv").style.display="none";
    document.getElementById("teacherArea").style.display="block";
    loadRecords();
  }else{
    document.getElementById("loginMsg").innerText="❌ 密碼錯誤";
  }
}

/* ===== 顯示成績 ===== */
function loadRecords(){
  const recordsTable = document.getElementById("records");
  recordsTable.innerHTML = "";
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  data.forEach(r=>{
    recordsTable.innerHTML += `<tr>
      <td>${r.class}</td>
      <td>${r.no}</td>
      <td>${r.name}</td>
      <td>${r.score}</td>
      <td>${r.time}</td>
    </tr>`;
  });
}

/* ===== 清空成績 ===== */
function clearRecords(){
  if(confirm("確定清空所有學生成績？")){
    localStorage.removeItem("records");
    loadRecords();
    alert("✅ 成績已清空");
  }
}

/* ===== 公佈答案 ===== */
function showAnswers(){
  document.getElementById("answerDiv").style.display="block";
  const answerKey = document.getElementById("answerKey");
  answerKey.innerHTML="";
  questions.forEach(q=>{
    answerKey.innerHTML += `<tr>
      <td>${q.id}</td>
      <td>${q.q}</td>
      <td>${q.o[q.a]}</td>
    </tr>`;
  });
}

/* ===== CSV 匯出（UTF-8 + BOM，Excel 不亂碼）===== */
function exportCSV(){
  const data = JSON.parse(localStorage.getItem("records") || "[]");
  if(!data.length){
    alert("目前沒有成績可匯出");
    return;
  }

  let csv = "班級,座號,姓名,分數,時間\n";
  data.forEach(r=>{
    csv += `"${r.class}","${r.no}","${r.name}","${r.score}","${r.time}"\n`;
  });

  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "資通安全測驗成績.csv";
  a.click();
}
</script>

</body>
</html>
