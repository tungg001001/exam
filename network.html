<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>網路基本常識測驗</title>

<style>
body{
font-family:"Microsoft JhengHei",sans-serif;
background:#0f172a;
color:#e5e7eb;
padding:20px;
}

h1,h2,h3{color:#38bdf8;}

.section{
background:#020617;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.question{margin-bottom:15px;}

input{
padding:5px;
margin:5px;
}

button{
background:#38bdf8;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0ea5e9;
}

button.danger{
background:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #334155;
padding:8px;
text-align:center;
}

th{
background:#1e293b;
}
</style>
</head>

<body>

<h1>🛡️ 網路基本常識測驗（20 題）</h1>

<div class="section">

<h2>👨‍🎓 學生資料</h2>

班級：
<input id="className">

座號：
<input id="no">

姓名：
<input id="name">

</div>

<div class="section" id="quiz"></div>

<button onclick="submitQuiz()">提交測驗</button>

<h2 id="result"></h2>

<hr>

<div class="section" id="teacherLoginDiv">

<h2>🔐 教師登入</h2>

教師密碼：
<input type="password" id="teacherPwd">

<button onclick="teacherLogin()">登入</button>

<p id="loginMsg" style="color:#f87171"></p>

</div>

<div class="section" id="teacherArea" style="display:none">

<h2>👨‍🏫 教師成績總覽</h2>

<button onclick="exportCSV()">📤 匯出 CSV</button>

<button class="danger" onclick="clearRecords()">🗑 清空所有成績</button>

<table>

<thead>

<tr>
<th>班級</th>
<th>座號</th>
<th>姓名</th>
<th>分數</th>
<th>時間</th>
</tr>

</thead>

<tbody id="records"></tbody>

</table>

<button onclick="showAnswers()">📢 公佈正確答案</button>

<div id="answerDiv" style="display:none">

<h3>📌 正確答案表</h3>

<table>

<thead>
<tr>
<th>題號</th>
<th>題目</th>
<th>正確答案</th>
</tr>
</thead>

<tbody id="answerKey"></tbody>

</table>

</div>

</div>

<script>

const TEACHER_PASSWORD="teacher123";

const questions=[

{id:1,q:"HTTP 協定主要用途是？",o:["傳送郵件","網頁傳輸","檔案壓縮","遠端桌面"],a:1},

{id:2,q:"IP 位址用途為？",o:["辨識網路裝置","加密資料","管理帳號","控制防火牆"],a:0},

{id:3,q:"DNS 的功能是？",o:["將域名轉為 IP","加密通訊","防範駭客","網頁快取"],a:0},

{id:4,q:"Wi-Fi 的加密方式不包含？",o:["WEP","WPA2","SSL","WPA3"],a:2},

{id:5,q:"OSI 七層模型第一層是？",o:["應用層","資料連結層","實體層","傳輸層"],a:2},

{id:6,q:"LAN 是指？",o:["區域網路","廣域網路","網際網路","行動網路"],a:0},

{id:7,q:"VPN 的主要作用是？",o:["匿名與加密","提升下載速度","備份資料","網頁設計"],a:0},

{id:8,q:"HTTPS 與 HTTP 的差異是？",o:["沒有差異","多一層加密","使用不同網域","支援舊版瀏覽器"],a:1},

{id:9,q:"MAC 位址主要用途為？",o:["裝置唯一識別","資料加密","網頁認證","傳輸速率"],a:0},

{id:10,q:"Ping 指令用途？",o:["測試網路連線","檢查硬碟容量","更新系統","掃描病毒"],a:0},

{id:11,q:"ARP 協定主要用來？",o:["IP 對應 MAC","加密資料","控制封包","阻擋攻擊"],a:0},

{id:12,q:"路由器的功能是？",o:["連接不同網路","資料加密","管理使用者","防毒"],a:0},

{id:13,q:"IPv6 相較 IPv4 的優點？",o:["更安全","地址更多","更快","更便宜"],a:1},

{id:14,q:"網路封包中最重要的資訊？",o:["來源與目的 IP","時間戳記","封包顏色","網頁內容"],a:0},

{id:15,q:"防火牆主要作用？",o:["阻擋未授權連線","加速網路","加密資料","管理帳號"],a:0},

{id:16,q:"HTTP 狀態碼 404 代表？",o:["成功","網頁不存在","伺服器錯誤","重定向"],a:1},

{id:17,q:"ARP Spoofing 攻擊目標是？",o:["IP 與 MAC 對應","加密資料","改變封包顏色","提升速度"],a:0},

{id:18,q:"網域名稱主要功能？",o:["將 IP 轉換成易記名稱","加密網路","防火牆設置","網頁快取"],a:0},

{id:19,q:"DHCP 協定作用為？",o:["自動分配 IP","加密資料","管理密碼","更新瀏覽器"],a:0},

{id:20,q:"ARP 協定全名？",o:["Address Resolution Protocol","Automatic Routing Protocol","Application Relay Protocol","Advanced Router Protocol"],a:0}

];

let currentQuestions=[];

window.onload=function(){

currentQuestions=[...questions].sort(()=>Math.random()-0.5);

const quiz=document.getElementById("quiz");

quiz.innerHTML="";

currentQuestions.forEach((q,i)=>{

let html=`<div class="question"><b>${i+1}. ${q.q}</b><br>`;

q.o.forEach((o,j)=>{

html+=`<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;

});

html+="</div>";

quiz.innerHTML+=html;

});

}

function submitQuiz(){

const c=document.getElementById("className").value;

const n=document.getElementById("no").value;

const nm=document.getElementById("name").value;

if(!c||!n||!nm){

alert("請填完整學生資料");

return;

}

let score=0;

currentQuestions.forEach((q,i)=>{

const s=document.querySelector(`input[name="q${i}"]:checked`);

if(s && +s.value===q.a) score++;

});

document.getElementById("result").innerText=`你的成績：${score} / 20`;

const data=JSON.parse(localStorage.getItem("records")||"[]");

data.push({class:c,no:n,name:nm,score,time:new Date().toLocaleString()});

localStorage.setItem("records",JSON.stringify(data));

loadRecords();

}

function teacherLogin(){

const pwd=document.getElementById("teacherPwd").value;

if(pwd===TEACHER_PASSWORD){

document.getElementById("teacherLoginDiv").style.display="none";

document.getElementById("teacherArea").style.display="block";

loadRecords();

}else{

document.getElementById("loginMsg").innerText="❌ 密碼錯誤";

}

}

function loadRecords(){

const tbody=document.getElementById("records");

tbody.innerHTML="";

const data=JSON.parse(localStorage.getItem("records")||"[]");

data.forEach(r=>{

tbody.innerHTML+=`<tr>

<td>${r.class}</td>

<td>${r.no}</td>

<td>${r.name}</td>

<td>${r.score}</td>

<td>${r.time}</td>

</tr>`;

});

}

function clearRecords(){

if(confirm("確定清空所有學生成績？")){

localStorage.removeItem("records");

loadRecords();

alert("✅ 成績已清空");

}

}

function showAnswers(){

document.getElementById("answerDiv").style.display="block";

const tbody=document.getElementById("answerKey");

tbody.innerHTML="";

questions.forEach(q=>{

tbody.innerHTML+=`<tr>

<td>${q.id}</td>

<td>${q.q}</td>

<td>${q.o[q.a]}</td>

</tr>`;

});

}

function exportCSV(){

const data=JSON.parse(localStorage.getItem("records")||"[]");

if(!data.length){

alert("目前沒有成績可匯出");

return;

}

let csv="班級,座號,姓名,分數,時間\n";

data.forEach(r=>{

csv+=`"${r.class}","${r.no}","${r.name}","${r.score}","${r.time}"\n`;

});

const BOM="\uFEFF";

const blob=new Blob([BOM+csv],{type:"text/csv;charset=utf-8;"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="網路基本常識測驗成績.csv";

a.click();

}

</script>

</body>
</html>
